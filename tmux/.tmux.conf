##### --- Prefix & Indexing ---
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1

##### --- UI/UX Enhancements ---
set -g mouse on
if-shell "infocmp tmux-256color >/dev/null 2>&1" \
  "set -g default-terminal 'tmux-256color'" \
  "set -g default-terminal 'screen-256color'"
set -as terminal-features ',alacritty*:RGB,xterm-256color:RGB,tmux-256color:RGB'
setw -g mode-keys vi
setw -g automatic-rename on
set-option -g automatic-rename-format "#{?pane_in_mode,#{pane_title},#{pane_current_command}}"
set-option -g allow-rename on
set-option -g display-time 1000

##### --- Pane Splitting & Navigation ---
bind '"' split-window -v
bind % split-window -h

# Copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip"
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind P run-shell "xclip -selection clipboard -o | tmux load-buffer - && tmux paste-buffer"

bind -n C-h  select-pane -L
bind -n C-l select-pane -R
bind -n C-k    select-pane -U
bind -n C-j  select-pane -D
bind -n M-left previous-window
bind -n M-right next-window

bind-key -r f run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"

bind-key C-s switch-client -t :previous
bind-key C-d switch-client -t :next

##### --- Reload Config ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

##### --- Status Bar ---
set -g status on
set -g status-interval 2

# mac-clear-dark, matching Alacritty
set -g status-style bg=#171d28,fg=#b8bec6
set -g message-style bg=#273d4c,fg=#e0e0e0
set -g pane-border-style fg=#35424c
set -g pane-active-border-style fg=#6d96b4

# Left: session name
set -g status-left "#[bg=#6d96b4,fg=#212734,bold] #S #[bg=#171d28,fg=#465c6d] "

# Right: time and date
set -g status-right "#[bg=#171d28,fg=#7d8894] %Y-%m-%d #[bg=#6d96b4,fg=#212734,bold] %H:%M "

# Window list: index:name — current window gets a '*'
setw -g window-status-style fg=#7d8894,bg=#171d28
setw -g window-status-current-style fg=#e0e0e0,bg=#273d4c,bold
set -g window-status-format "#[bg=#171d28,fg=#465c6d] #I #[fg=#7d8894]#W "
set -g window-status-current-format "#[bg=#273d4c,fg=#6d96b4,bold] #I #[fg=#e0e0e0]#W* "

# Optional: tweak length (not strictly needed anymore)
set -g status-left-length 20
set -g status-right-length 40
 
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'

# Restore
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
