general {
    immediate_render = true
}

background {
    monitor =
    path = ~/.config/hypr/backgrounds/tree.png
    color = rgba(29, 32, 33, 0.9)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 0 # 0 disables blurring
    blur_size = 2
    noise = 0
    contrast = 0
    brightness = 0
    vibrancy = 0
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 500, 30
    outline_thickness = 0
    dots_size = 0.55 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.55 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(86, 89, 90, 0.9)
    inner_color = rgba(40, 40, 40, 0.82)
    font_color = rgba(212, 190, 152, 0.95)
    fade_on_empty = false
    placeholder_text = # Text rendered in the input box when it's empty.
    hide_input = false
    check_color = rgba(169, 182, 101, 0.95)
    fail_color = rgba(234, 105, 98, 0.95) # if authentication failed, changes outer_color and fail message color
    fail_text = $FAIL <b>($ATTEMPTS)</b> # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below
    position = 0, -468
    halign = center
    valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgba(212, 190, 152, 0.95)
  font_size = 20
  font_family = Inter Bold
  position = 0, 405
  halign = center
  valign = center
}

label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%k:%M")"
  color = rgba(255, 240, 190, 0.95)
  font_size = 93
  font_family = Inter Bold
  position = 0, 310
  halign = center
  valign = center
}
